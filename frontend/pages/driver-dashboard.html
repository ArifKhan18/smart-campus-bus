<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard | Smart Campus Bus</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        body {
            background-color: #07070E;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Glows */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(108, 99, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        .bg-glow--1 { top: -200px; right: -200px; }
        .bg-glow--2 { bottom: -200px; left: -200px; background: radial-gradient(circle, rgba(0, 200, 83, 0.1) 0%, rgba(0, 0, 0, 0) 70%); }

        .driver-container {
            width: 100%;
            max-width: 1000px; /* Increased for desktop */
            padding: 30px 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        .driver-greeting {
            display: flex;
            flex-direction: column;
        }

        .greeting-text {
            font-size: 0.8rem;
            color: var(--text-primary);
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .driver-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(255, 107, 107, 0.1);
            color: #ff4d4d;
            border-color: rgba(255, 107, 107, 0.3);
        }

        /* Center Action Area - Round Button */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            position: relative;
        }

        /* Ripple Animation for Start Button */
        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(0, 200, 83, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0); }
        }
        @keyframes ripple-stop {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(255, 77, 77, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }

        .round-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .round-btn::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            animation: spin 10s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .btn-start {
            background: linear-gradient(135deg, #00E676 0%, #00C853 100%);
            color: #004D40;
            box-shadow: 0 10px 30px rgba(0, 200, 83, 0.3);
            animation: ripple 2s infinite;
        }
        .btn-start:hover { transform: scale(1.05); }

        .btn-stop {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF4D4D 100%);
            color: #4A0000;
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.3);
            display: none;
            animation: ripple-stop 2s infinite;
        }
        .btn-stop:hover { transform: scale(1.05); }

        .btn-delay {
            background: linear-gradient(135deg, #FFB74D 0%, #FF9800 100%);
            color: #4A2B00;
            box-shadow: 0 10px 30px rgba(255, 152, 0, 0.3);
            display: none;
            width: 160px;
            height: 160px;
            margin: 20px auto 0;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-delay:hover { transform: scale(1.05); }
        .btn-delay.hidden { display: none !important; }

        .btn-icon {
            font-size: 3rem;
            line-height: 1;
        }

        .btn-text {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .trip-status {
            margin-top: 30px;
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* GPS Status (Phase 14) */
        .gps-status {
            margin-top: 15px;
            font-size: 0.95rem;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .gps-status.visible {
            opacity: 1;
        }
        .gps-status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .gps-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-primary);
        }
        .gps-dot.active {
            background: var(--accent-success);
            box-shadow: 0 0 8px var(--accent-success);
            animation: pulse-dot 1.5s infinite;
        }
        .gps-dot.error {
            background: #ff4d4d;
            box-shadow: 0 0 8px #ff4d4d;
        }
        @keyframes pulse-dot {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .gps-details {
            font-size: 0.85rem;
            color: var(--text-primary);
            opacity: 0.8;
        }

        /* Glassmorphism Info Card */
        .info-card {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-icon {
            width: 50px;
            height: 50px;
            background: rgba(108, 99, 255, 0.1);
            color: var(--accent-primary);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
        }

        .info-details {
            flex: 1;
        }

        .info-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--text-primary);
            opacity: 0.9;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            width: 100%;
        }

        /* Schedule Timeline */
        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 15px;
            border-radius: 10px;
            border-left: 3px solid var(--accent-primary);
        }

        .schedule-item.active {
            background: rgba(0, 200, 83, 0.05);
            border-left-color: var(--accent-success);
        }

        .schedule-time {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .schedule-route {
            font-size: 0.95rem;
            color: var(--text-primary);
            opacity: 0.9;
        }

        /* Desktop specific layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
                align-items: center;
            }
            .action-area {
                padding: 60px 0;
            }
            .round-btn {
                width: 240px;
                height: 240px;
            }
            .btn-icon {
                font-size: 4rem;
            }
            .btn-text {
                font-size: 1.5rem;
            }
            .info-card {
                padding: 40px;
            }
        }

    </style>
</head>

<body>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <div class="driver-container">
        
        <!-- Header -->
        <header class="top-bar">
            <div class="logo-area">
                <div class="logo-icon">🚌</div>
                <div class="driver-greeting">
                    <span class="greeting-text">Hello Driver</span>
                    <span class="driver-name" id="user-name">Loading...</span>
                </div>
            </div>
            <button id="btn-logout" class="btn-logout">Sign Out</button>
        </header>

        <div class="dashboard-grid">
            <!-- Big Start Button (Left side on desktop, top on mobile) -->
            <div class="action-area">
                <button id="btn-start-trip" class="round-btn btn-start">
                    <span class="btn-icon">▶</span>
                    <span class="btn-text">START</span>
                </button>
                
                <button id="btn-stop-trip" class="round-btn btn-stop">
                    <span class="btn-icon">⏹</span>
                    <span class="btn-text">STOP</span>
                </button>
                
                <button id="btn-delay-bus" class="btn-delay hidden">
                    <span class="btn-icon" style="font-size: 2rem;">⏳</span>
                    <span class="btn-text" style="font-size: 1rem;">DELAY</span>
                </button>
                
                <div class="trip-status" id="trip-status">Ready for next trip</div>
                
                <!-- GPS Status (Phase 14) -->
                <div class="gps-status" id="gps-status">
                    <div class="gps-status-indicator">
                        <div class="gps-dot" id="gps-dot"></div>
                        <span id="gps-text">GPS Offline</span>
                    </div>
                    <div class="gps-details" id="gps-details">Location not available</div>
                </div>
            </div>

            <!-- Info Card (Right side on desktop, bottom on mobile) -->
            <div class="info-card">
                
                <!-- Assigned Bus -->
                <div class="info-row">
                    <div class="info-icon">🚐</div>
                    <div class="info-details">
                        <div class="info-label">ASSIGNED BUS</div>
                        <h3 class="info-value" id="assigned-bus">--</h3>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Duty Schedule -->
                <div class="info-row" style="align-items: flex-start;">
                    <div class="info-icon" style="background: rgba(0, 200, 83, 0.1); color: var(--accent-success);">⏰</div>
                    <div class="info-details" style="width: 100%;">
                        <div class="info-label" style="margin-bottom: 10px;">TODAY'S DUTY SCHEDULE</div>
                        <div class="schedule-list" id="duty-schedule-list">
                            <!-- Dynamic schedules will be rendered here -->
                            <div class="schedule-item">
                                <span class="schedule-time" style="color: var(--text-primary);">Loading schedules...</span>
                            </div>
                        </div>
        </div>

    </div>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/auth-guard.js"></script>
    <script type="module" src="../js/driver-dashboard.js"></script>
</body>

</html>
