<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard | Smart Campus Bus</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Removed AI Background Glows */

        .driver-container {
            width: 100%;
            max-width: 1000px; /* Increased for desktop */
            padding: 30px 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 1.5rem;
            background: var(--bg-surface-hover);
            border: 1px solid var(--border-card);
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        .driver-greeting {
            display: flex;
            flex-direction: column;
        }

        .greeting-text {
            font-size: 0.8rem;
            color: var(--text-primary);
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .driver-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
        }

        .btn-logout {
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-card);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(220, 38, 38, 0.1);
            color: var(--accent-warm);
            border-color: rgba(220, 38, 38, 0.3);
        }

        /* Center Action Area - Round Button */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            position: relative;
        }

        /* Ripple Animation for Start Button */
        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(0, 200, 83, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0); }
        }
        @keyframes ripple-stop {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(255, 77, 77, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }

        .round-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .round-btn::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px dashed var(--text-muted);
            animation: spin 10s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .btn-start {
            background: #10b981;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
            animation: ripple 2s infinite;
        }
        .btn-start:hover { transform: scale(1.05); }

        .btn-stop {
            background: #ef4444;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
            display: none;
            animation: ripple-stop 2s infinite;
        }
        .btn-stop:hover { transform: scale(1.05); }

        .btn-delay {
            background: #f59e0b;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
            display: none;
            width: 160px;
            height: 160px;
            margin: 20px auto 0;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-delay:hover { transform: scale(1.05); }
        .btn-delay.hidden { display: none !important; }

        .btn-icon {
            font-size: 3rem;
            line-height: 1;
        }

        .btn-text {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .trip-status {
            margin-top: 15px;
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 500;
            background: var(--bg-surface);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-card);
        }

        /* Direction Selector */
        .direction-selector {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            max-width: 240px;
        }
        
        .direction-selector label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .direction-selector select {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-card);
            padding: 10px;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        
        .direction-selector select:focus {
            border-color: var(--accent-primary);
        }

        /* GPS Status (Phase 14) */
        .gps-status {
            margin-top: 15px;
            font-size: 0.95rem;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .gps-status.visible {
            opacity: 1;
        }
        .gps-status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .gps-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-primary);
        }
        .gps-dot.active {
            background: var(--accent-success);
            box-shadow: 0 0 8px var(--accent-success);
            animation: pulse-dot 1.5s infinite;
        }
        .gps-dot.error {
            background: #ff4d4d;
            box-shadow: 0 0 8px #ff4d4d;
        }
        @keyframes pulse-dot {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .gps-details {
            font-size: 0.85rem;
            color: var(--text-primary);
            opacity: 0.8;
        }

        /* Glassmorphism Info Card */
        .info-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-icon {
            width: 50px;
            height: 50px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--accent-primary);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
        }

        .info-details {
            flex: 1;
        }

        .info-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--text-primary);
            opacity: 0.9;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .divider {
            height: 1px;
            background: var(--border-subtle);
            width: 100%;
        }

        /* Schedule Timeline */
        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-surface-hover);
            border: 1px solid var(--border-card);
            padding: 12px 15px;
            border-radius: 10px;
            border-left: 3px solid var(--accent-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .schedule-item:hover {
            background: rgba(108, 99, 255, 0.05);
        }

        .schedule-item.selected {
            background: rgba(108, 99, 255, 0.1);
            border-left: 4px solid var(--accent-primary);
            box-shadow: 0 2px 10px rgba(108, 99, 255, 0.1);
        }

        .schedule-item.active {
            background: rgba(0, 200, 83, 0.05);
            border-left-color: var(--accent-success);
        }

        .schedule-time {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .schedule-route {
            font-size: 0.95rem;
            color: var(--text-primary);
            opacity: 0.9;
        }

        /* Desktop specific layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
                align-items: center;
            }
            .action-area {
                padding: 60px 0;
            }
            .round-btn {
                width: 240px;
                height: 240px;
            }
            .btn-icon {
                font-size: 4rem;
            }
            .btn-text {
                font-size: 1.5rem;
            }
            .info-card {
                padding: 40px;
            }
        }

    </style>
    <!-- Theme Script -->
    <script src="../js/theme.js"></script>
</head>

<body>
    <div class="driver-container">
        
        <!-- Header -->
        <header class="top-bar">
            <div class="logo-area">
                <div class="logo-icon">🚌</div>
                <div class="driver-greeting">
                    <span class="greeting-text" data-i18n="hello">Hello,</span>
                    <h2 class="driver-name" id="user-name">Driver</h2>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button id="lang-toggle-btn" title="Toggle Language" style="background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-card); border-radius:8px; padding:8px; cursor:pointer; font-size:0.85rem; font-family:'Inter', sans-serif; transition:all 0.2s;">বাংলা</button>
                <button id="theme-toggle-btn" class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme" style="background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-card); border-radius:50%; width:36px; height:36px; cursor:pointer; font-size:1.1rem; transition:all 0.2s;">☀️</button>
                <button id="btn-logout" class="btn-logout" data-i18n="sign_out">Sign Out</button>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Action Area (Left side on desktop, top on mobile) - Only for active trip controls -->
            <div class="action-area">
                
                <!-- Main Start Button ALWAYS visible initially -->
                <button id="btn-start-trip" class="round-btn btn-start">
                    <span class="btn-icon">▶</span>
                    <span class="btn-text" data-i18n="start">START</span>
                </button>
                
                <button id="btn-cancel-connecting" data-i18n="cancel" style="margin-top: 15px; background: transparent; border: 1px solid #ef4444; color: #ef4444; border-radius: 20px; padding: 8px 24px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: none; font-family: 'Inter', sans-serif;">
                    ✕ CANCEL
                </button>
                
                <button id="btn-stop-trip" class="round-btn btn-stop">
                    <span class="btn-icon">⏹</span>
                    <span class="btn-text" data-i18n="stop">STOP</span>
                </button>
                
                <button id="btn-delay-bus" class="btn-delay hidden">
                    <span class="btn-icon" style="font-size: 2rem;">⏳</span>
                    <span class="btn-text" style="font-size: 1rem;" data-i18n="delay">DELAY</span>
                </button>
                
                <div class="trip-status" id="trip-status" data-i18n="ready_next_trip">Ready for next trip</div>
                
                <!-- GPS Status (Phase 14) -->
                <div class="gps-status" id="gps-status">
                    <div class="gps-status-indicator">
                        <div class="gps-dot" id="gps-dot"></div>
                        <span id="gps-text" data-i18n="gps_offline">GPS Offline</span>
                    </div>
                    <div class="gps-details" id="gps-details" data-i18n="location_not_available">Location not available</div>
                </div>
            </div>

            <!-- Info Card (Right side on desktop, bottom on mobile) -->
            <div class="info-card">
                
                <!-- Assigned Bus -->
                <div class="info-row">
                    <div class="info-icon">🚐</div>
                    <div class="info-details">
                        <div class="info-label" data-i18n="assigned_bus">ASSIGNED BUS</div>
                        <h3 class="info-value" id="assigned-bus">--</h3>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Duty Info -->
                <div class="info-row" style="align-items: flex-start;">
                    <div class="info-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">ℹ️</div>
                    <div class="info-details" style="width: 100%;">
                        <div class="info-label" style="margin-bottom: 10px;" data-i18n="trip_setup">TRIP SETUP</div>
                        <div style="font-size: 0.9rem; color: var(--text-muted); line-height: 1.5;" data-i18n="trip_setup_desc">
                            Click START to setup your trip details and begin broadcasting GPS.
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <!-- Trip Setup Modal -->
    <div id="trip-setup-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div style="background: var(--bg-surface); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border-card); box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
            <h3 style="margin-top: 0; font-family: 'Outfit'; color: var(--text-primary); margin-bottom: 20px; font-size: 1.5rem; text-align: center;" data-i18n="setup_trip">Setup Trip</h3>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; font-family: 'Inter'; text-transform: uppercase;" data-i18n="select_direction">1. Select Direction</label>
                <select id="trip-direction-select" style="width: 100%; background: var(--bg-surface-hover); color: var(--text-primary); border: 1px solid var(--border-card); padding: 12px; border-radius: 8px; font-size: 1rem; font-family: 'Outfit', sans-serif; outline: none; cursor: pointer;">
                    <option value="" data-i18n="select_direction_opt">-- Select Direction --</option>
                    <option value="forward" id="opt-forward" data-i18n="start_to_end">Start &rarr; End</option>
                    <option value="return" id="opt-return" data-i18n="end_to_start">End &rarr; Start</option>
                </select>
            </div>
            
            <div id="schedule-selector-container" style="display: none; flex-direction: column; margin-bottom: 25px;">
                <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; font-family: 'Inter'; text-transform: uppercase;" data-i18n="select_time">2. Select Time</label>
                <select id="trip-time-select" style="width: 100%; background: var(--bg-surface-hover); color: var(--text-primary); border: 1px solid var(--border-card); padding: 12px; border-radius: 8px; font-size: 1rem; font-family: 'Outfit', sans-serif; outline: none; cursor: pointer;">
                    <option value="" data-i18n="select_time_opt">-- Select Time --</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button id="btn-close-modal" data-i18n="cancel" style="flex: 1; padding: 12px; border-radius: 10px; background: transparent; border: 1px solid var(--border-card); color: var(--text-primary); font-family: 'Inter'; font-weight: 600; cursor: pointer;">Cancel</button>
                <button id="btn-confirm-start" data-i18n="start_trip" class="btn btn--primary" style="flex: 1; padding: 12px; border-radius: 10px; border: none; background: var(--accent-success); font-family: 'Inter'; font-weight: 600; cursor: pointer; opacity: 0.5; pointer-events: none; transition: all 0.2s;">Start Trip</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/auth-guard.js"></script>
    <script type="module" src="../js/driver-dashboard.js"></script>
</body>

</html>
