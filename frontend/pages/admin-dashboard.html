<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Smart Campus Bus</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Inline styles for specific dashboard layout if needed before style.css is updated -->
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
            background-color: var(--bg-dark);
        }
        .admin-sidebar {
            width: 260px;
            background: rgba(18, 18, 28, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: fixed;
            height: 100vh;
        }
        .admin-sidebar .logo {
            justify-content: flex-start;
        }
        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .admin-nav__link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .admin-nav__link:hover, .admin-nav__link.active {
            background: rgba(108, 99, 255, 0.1);
            color: var(--accent-primary);
        }
        .admin-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem 3rem;
            overflow-y: auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }
        .admin-header__title {
            font-size: 1.8rem;
            color: var(--text-light);
            font-weight: 600;
        }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .admin-user__avatar {
            font-size: 1.2rem;
        }
        .admin-user__name {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.04);
        }
        .stat-card__title {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .stat-card__value {
            color: var(--text-light);
            font-size: 2rem;
            font-weight: 700;
        }
        .stat-card__value.text-warning { color: var(--accent-warning); }
        .stat-card__value.text-success { color: var(--accent-success); }
        .stat-card__value.text-danger { color: #ff4d4d; }
        
        .admin-section__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .admin-section__title {
            font-size: 1.3rem;
            color: var(--text-light);
            font-weight: 600;
        }
        .filter-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 0.3rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .filter-tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .filter-tab.active {
            background: var(--accent-primary);
            color: white;
            box-shadow: 0 4px 10px rgba(108, 99, 255, 0.3);
        }
        
        .driver-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .driver-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: all 0.3s ease;
        }
        .driver-card:hover {
            border-color: rgba(108, 99, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        .driver-card__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .driver-card__info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .driver-card__name {
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: 600;
        }
        .driver-card__email {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .status-badge {
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-badge--pending { background: rgba(255, 170, 0, 0.1); color: var(--accent-warning); border: 1px solid rgba(255, 170, 0, 0.2); }
        .status-badge--active { background: rgba(0, 200, 83, 0.1); color: var(--accent-success); border: 1px solid rgba(0, 200, 83, 0.2); }
        .status-badge--rejected { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.2); }
        
        .driver-card__details {
            padding: 1rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .detail-item__label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .detail-item__value {
            color: var(--text-light);
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .driver-card__actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        .btn-action {
            flex: 1;
            padding: 0.6rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-approve {
            background: rgba(0, 200, 83, 0.15);
            color: var(--accent-success);
        }
        .btn-approve:hover {
            background: rgba(0, 200, 83, 0.25);
        }
        .btn-reject {
            background: rgba(255, 77, 77, 0.15);
            color: #ff4d4d;
        }
        .btn-reject:hover {
            background: rgba(255, 77, 77, 0.25);
        }
        
        .empty-state {
            grid-column: 1 / -1;
            padding: 4rem 2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-muted);
        }
        .empty-state__icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <a href="../index.html" class="logo">
                <span class="logo__icon">🚌</span>
                <span class="logo__text">SmartBus</span>
            </a>
            
            <nav class="admin-nav">
                <a href="#" class="admin-nav__link active">
                    <span>👥</span> Driver Approvals
                </a>
                <a href="#" class="admin-nav__link" onclick="alert('Coming in Phase 5')">
                    <span>🚐</span> Manage Buses
                </a>
                <a href="#" class="admin-nav__link" onclick="alert('Coming in Phase 6')">
                    <span>🗺️</span> Routes & Stops
                </a>
                <a href="#" class="admin-nav__link" onclick="alert('Coming in Phase 7')">
                    <span>📅</span> Schedules
                </a>
            </nav>
            
            <div style="margin-top: auto;">
                <button id="btn-logout" class="btn btn--outline" style="width: 100%;">
                    <span>🚪</span> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <header class="admin-header">
                <h1 class="admin-header__title">Admin Dashboard</h1>
                <div class="admin-user">
                    <span class="admin-user__avatar">🛡️</span>
                    <span class="admin-user__name" id="admin-name">Loading...</span>
                </div>
            </header>

            <!-- Stats Overview -->
            <div class="admin-stats">
                <div class="stat-card">
                    <span class="stat-card__title">Total Drivers</span>
                    <span class="stat-card__value" id="stat-total">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-card__title">Pending Approvals</span>
                    <span class="stat-card__value text-warning" id="stat-pending">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-card__title">Approved Drivers</span>
                    <span class="stat-card__value text-success" id="stat-approved">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-card__title">Rejected Applications</span>
                    <span class="stat-card__value text-danger" id="stat-rejected">0</span>
                </div>
            </div>

            <!-- Driver Management Section -->
            <section class="admin-section">
                <div class="admin-section__header">
                    <h2 class="admin-section__title">Driver Management</h2>
                    <div class="filter-tabs" id="filter-tabs">
                        <button class="filter-tab active" data-filter="all">All</button>
                        <button class="filter-tab" data-filter="pending">Pending</button>
                        <button class="filter-tab" data-filter="active">Approved</button>
                        <button class="filter-tab" data-filter="rejected">Rejected</button>
                    </div>
                </div>

                <!-- Driver Grid -->
                <div class="driver-grid" id="driver-grid">
                    <!-- Loading State -->
                    <div class="empty-state">
                        <div style="width: 40px; height: 40px; border: 3px solid rgba(108, 99, 255, 0.3); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;"></div>
                        <p>Loading drivers...</p>
                        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Component -->
    <div id="toast-container" class="toast-container"></div>
    <script src="./components/toast.html" type="text/html"></script>

    <!-- Scripts -->
    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/auth-guard.js"></script>
    <script type="module" src="../js/admin-dashboard.js"></script>
    
    <script>
        // Inline toast logic
        window.showToast = function(message, type = 'success', duration = 4000) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = `toast toast--${type}`;
            let icon = type === 'error' ? '❌' : (type === 'warning' ? '⚠️' : '✅');
            
            toast.innerHTML = `
                <div class="toast__icon">${icon}</div>
                <div class="toast__content"><div class="toast__message">${message}</div></div>
                <button class="toast__close" aria-label="Close">&times;</button>
                <div class="toast__progress"></div>
            `;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('toast--visible'), 10);
            
            toast.querySelector('.toast__close').addEventListener('click', () => {
                toast.classList.remove('toast--visible');
                setTimeout(() => toast.remove(), 300);
            });
            
            if (duration > 0) {
                setTimeout(() => {
                    toast.classList.remove('toast--visible');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }
        };
    </script>
</body>

</html>
