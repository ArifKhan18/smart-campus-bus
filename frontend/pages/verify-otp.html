<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account - Smart Campus Bus</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        /* OTP specific styling */
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }
        
        .otp-input {
            width: 50px;
            height: 60px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            border: 2px solid var(--border-card);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }
        
        .otp-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
            outline: none;
        }

        .otp-input:disabled {
            background: var(--bg-secondary);
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .resend-box {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .resend-box button {
            background: none;
            border: none;
            color: var(--accent-primary);
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            margin-left: 5px;
        }
        
        .resend-box button:disabled {
            color: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Mobile responsiveness for OTP inputs */
        @media (max-width: 400px) {
            .otp-input {
                width: 38px;
                height: 48px;
                font-size: 20px;
            }
            .otp-container {
                gap: 5px;
            }
        }
    </style>
</head>
<body class="auth-page">
    <div class="page-wrapper" id="page-wrapper">
        <!-- Background Glows -->
        <div class="page-wrapper__bg-glow page-wrapper__bg-glow--top-right"></div>
        <div class="page-wrapper__bg-glow page-wrapper__bg-glow--bottom-left"></div>

        <!-- Top Links -->
        <div style="display: flex; justify-content: flex-end; align-items: center; width: 100%; max-width: 1200px; padding: 1.5rem; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 100;">
            <button id="theme-toggle-btn" class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme" style="background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-card); border-radius:50%; width:36px; height:36px; cursor:pointer; font-size:1.1rem; transition:all 0.2s;">☀️</button>
        </div>

        <!-- Auth Content -->
        <div class="auth" id="auth">
            <!-- Logo -->
            <div class="auth__logo" id="auth-logo">
                <span class="logo__icon">✉️</span>
                <span class="logo__text">Verification</span>
            </div>

            <!-- Auth Card -->
            <div class="auth__card" id="auth-card" style="border-top-color: var(--accent-primary);">
                
                <h1 class="auth__title" style="margin-bottom: 5px;">Check Your Email</h1>
                <p class="auth__subtitle" style="margin-bottom: 20px;">We've sent a 6-digit code to <br/><strong id="user-email-display" style="color: var(--accent-primary);">your email</strong></p>

                <form class="auth-form" id="otp-form">
                    
                    <div class="otp-container">
                        <input type="text" inputmode="numeric" class="otp-input" maxlength="1" required>
                        <input type="text" inputmode="numeric" class="otp-input" maxlength="1" required disabled>
                        <input type="text" inputmode="numeric" class="otp-input" maxlength="1" required disabled>
                        <input type="text" inputmode="numeric" class="otp-input" maxlength="1" required disabled>
                        <input type="text" inputmode="numeric" class="otp-input" maxlength="1" required disabled>
                        <input type="text" inputmode="numeric" class="otp-input" maxlength="1" required disabled>
                    </div>

                    <button type="submit" class="auth__submit" id="btn-verify" style="margin-top: 10px; background-color: var(--accent-primary);">
                        Verify Account
                    </button>
                    
                    <div class="resend-box">
                        Didn't receive the code? 
                        <button type="button" id="btn-resend">Resend Code</button>
                        <span id="resend-timer" style="display: none; margin-left: 5px;">(60s)</span>
                    </div>
                </form>

                <div class="auth__divider">or</div>
                
                <div class="auth__footer">
                    Wrong email?
                    <a href="#" id="btn-logout">Log out</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/api.js"></script>
    <script type="module" src="../js/theme.js"></script>
    
    <!-- OTP Specific Logic -->
    <script type="module">
        import { auth } from "../js/firebase-config.js";
        import { ApiService } from "../js/api.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        
        const inputs = document.querySelectorAll('.otp-input');
        const form = document.getElementById('otp-form');
        const btnVerify = document.getElementById('btn-verify');
        const btnResend = document.getElementById('btn-resend');
        const btnLogout = document.getElementById('btn-logout');
        const resendTimer = document.getElementById('resend-timer');
        const emailDisplay = document.getElementById('user-email-display');
        
        let currentUser = null;
        
        // ── Auth State Listener ──
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                emailDisplay.textContent = user.email;
                
                // If already verified, redirect based on role
                if (user.emailVerified) {
                    redirectBasedOnRole();
                } else {
                    // Send initial OTP automatically if they just arrived
                    if (!sessionStorage.getItem('otp_sent_once')) {
                        sendOtpRequest();
                        sessionStorage.setItem('otp_sent_once', 'true');
                    }
                }
            } else {
                window.location.href = '../index.html#how-it-works';
            }
        });
        
        async function redirectBasedOnRole() {
            try {
                const userData = await ApiService.fetchWithAuth(`/Auth/user/${currentUser.uid}`);
                if (userData.role === 'admin') window.location.href = 'admin-dashboard.html';
                else if (userData.role === 'driver') window.location.href = 'driver-dashboard.html';
                else window.location.href = 'student-dashboard.html';
            } catch (error) {
                console.error("Error fetching role:", error);
                alert("Could not load user profile.");
            }
        }
        
        // ── Input Handling (Auto Focus Next) ──
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (input.value.length > 1) {
                    input.value = input.value.slice(0, 1);
                }
                
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].disabled = false;
                    inputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            
            // Handle paste of 6 digits
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, 6).replace(/[^0-9]/g, '');
                if (pastedData) {
                    for (let i = 0; i < pastedData.length; i++) {
                        if (i < inputs.length) {
                            inputs[i].disabled = false;
                            inputs[i].value = pastedData[i];
                            if (i === pastedData.length - 1 || i === inputs.length - 1) {
                                inputs[i].focus();
                            }
                        }
                    }
                }
            });
        });
        
        // ── Submit OTP ──
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            let code = '';
            inputs.forEach(input => code += input.value);
            
            if (code.length !== 6) {
                alert('Please enter all 6 digits.');
                return;
            }
            
            btnVerify.textContent = 'Verifying...';
            btnVerify.disabled = true;
            
            try {
                await ApiService.fetchWithAuth('/Auth/verify-otp', {
                    method: 'POST',
                    body: JSON.stringify({ code })
                });
                
                // Force Firebase to refresh token so emailVerified = true is recognized
                await currentUser.reload();
                
                alert("Account successfully verified!");
                redirectBasedOnRole();
                
            } catch (error) {
                console.error(error);
                alert(error.message || 'Invalid code.');
                inputs.forEach(input => input.value = '');
                inputs[0].focus();
            } finally {
                btnVerify.textContent = 'Verify Account';
                btnVerify.disabled = false;
            }
        });
        
        // ── Resend OTP ──
        async function sendOtpRequest() {
            try {
                await ApiService.fetchWithAuth('/Auth/send-otp', { method: 'POST' });
                startResendTimer();
                if(window.showToast) window.showToast("OTP sent! Check your email.", 'success');
            } catch (error) {
                console.error("OTP Send Error:", error);
                alert("Error sending OTP: " + (error.message || "Unknown error"));
                
                // Allow resend immediately if failed
                sessionStorage.removeItem('otp_sent_once');
                btnResend.disabled = false;
            }
        }
        
        btnResend.addEventListener('click', sendOtpRequest);
        
        function startResendTimer() {
            btnResend.disabled = true;
            resendTimer.style.display = 'inline';
            let seconds = 60;
            
            const interval = setInterval(() => {
                seconds--;
                resendTimer.textContent = `(${seconds}s)`;
                
                if (seconds <= 0) {
                    clearInterval(interval);
                    btnResend.disabled = false;
                    resendTimer.style.display = 'none';
                }
            }, 1000);
        }
        
        // ── Logout ──
        btnLogout.addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
        });
        
    </script>
</body>
</html>
