<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Smart Campus Bus Tracking System.">
    <title>Login | Smart Campus Bus</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="page-wrapper" id="page-wrapper">
        <!-- Background Glows -->
        <div class="page-wrapper__bg-glow page-wrapper__bg-glow--top-right"></div>
        <div class="page-wrapper__bg-glow page-wrapper__bg-glow--bottom-left"></div>

        <!-- Back Link -->
        <a href="role-select.html" class="back-link" id="back-link">
            <span class="back-link__arrow">←</span>
            Change Role
        </a>

        <!-- Auth Content -->
        <div class="auth" id="auth">
            <!-- Logo -->
            <a href="../index.html" class="auth__logo" id="auth-logo">
                <span class="logo__icon">🚌</span>
                <span class="logo__text">SmartBus</span>
            </a>

            <!-- Auth Card -->
            <div class="auth__card" id="auth-card">
                <!-- Role Badge (dynamically styled by JS) -->
                <div class="auth__role-badge" id="auth-role-badge">
                    <span class="auth__role-badge-icon" id="auth-role-icon">🎓</span>
                    <span id="auth-role-label">Student</span>
                </div>

                <h1 class="auth__title" id="auth-title">Welcome Back</h1>
                <p class="auth__subtitle" id="auth-subtitle">Sign in to your account to continue</p>

                <!-- Login Form -->
                <form id="login-form" novalidate>
                    <!-- Email -->
                    <div class="form-group" id="form-group-email">
                        <label class="form-group__label" for="login-email">Email Address</label>
                        <div class="form-group__input-wrapper">
                            <span class="form-group__icon">✉️</span>
                            <input type="email" class="form-group__input" id="login-email"
                                placeholder="Enter your email" autocomplete="email" required>
                        </div>
                        <p class="form-group__error" id="error-email">Please enter a valid email address</p>
                    </div>

                    <!-- Password -->
                    <div class="form-group" id="form-group-password">
                        <label class="form-group__label" for="login-password">Password</label>
                        <div class="form-group__input-wrapper">
                            <span class="form-group__icon">🔒</span>
                            <input type="password" class="form-group__input" id="login-password"
                                placeholder="Enter your password" autocomplete="current-password" required>
                            <button type="button" class="form-group__toggle-password" id="toggle-password"
                                aria-label="Toggle password visibility">👁️</button>
                        </div>
                        <p class="form-group__error" id="error-password">Password is required</p>
                    </div>

                    <!-- Forgot Password -->
                    <a href="#" class="auth__forgot" id="auth-forgot">Forgot Password?</a>

                    <!-- Submit Button -->
                    <button type="submit" class="auth__submit" id="auth-submit">
                        Sign In
                    </button>
                </form>

                <!-- Divider -->
                <div class="auth__divider">or</div>

                <!-- Register Link (hidden for admin) -->
                <div class="auth__footer" id="auth-footer">
                    Don't have an account?
                    <a href="register.html" id="auth-register-link">Register</a>
                </div>
            </div>

            <!-- Change Role -->
            <p class="auth__change-role" id="auth-change-role">
                Not your role? <a href="role-select.html">Choose a different role</a>
            </p>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="auth-loading" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 7, 14, 0.8); z-index: 1000; align-items: center; justify-content: center; flex-direction: column;">
        <div style="width: 40px; height: 40px; border: 4px solid rgba(108, 99, 255, 0.3); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; color: white; font-weight: 500;" id="auth-loading-text">Signing in...</p>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>

    <!-- Scripts -->
    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/auth.js"></script>

    <!-- Toast Component -->
    <div id="toast-container" class="toast-container"></div>
    <script src="./components/toast.html" type="text/html"></script>
    <script>
        // Inline toast logic for immediate use before modules load
        window.showToast = function(message, type = 'success', duration = 4000) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = `toast toast--${type}`;
            let icon = type === 'error' ? '❌' : (type === 'warning' ? '⚠️' : '✅');
            
            toast.innerHTML = `
                <div class="toast__icon">${icon}</div>
                <div class="toast__content"><div class="toast__message">${message}</div></div>
                <button class="toast__close" aria-label="Close">&times;</button>
                <div class="toast__progress"></div>
            `;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('toast--visible'), 10);
            
            toast.querySelector('.toast__close').addEventListener('click', () => {
                toast.classList.remove('toast--visible');
                setTimeout(() => toast.remove(), 300);
            });
            
            if (duration > 0) {
                setTimeout(() => {
                    toast.classList.remove('toast--visible');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }
        };
    </script>
</body>

</html>
